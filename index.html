<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>生日快乐 昊洋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  background:linear-gradient(135deg, #cfe7ff, #e6f0fa, #f0f7ff);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:"Microsoft Yahei","PingFang SC","Helvetica Neue",sans-serif;
  padding:20px;
}
.card{
  background:rgba(255,255,255,0.92);
  padding:50px 30px;
  border-radius:32px;
  box-shadow:0 10px 40px rgba(70,130,200,0.2);
  text-align:center;
  animation:float 3s ease-in-out infinite;
  width:100%;
  max-width:500px;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
h1{
  font-size:clamp(32px, 8vw, 52px);
  color:#1e4a76;
  letter-spacing:2px;
  text-shadow:0 2px 8px rgba(30,74,118,0.15);
  line-height:1.3;
  word-break:keep-all;
}
.decor{
  margin:16px 0;
  font-size:24px;
  color:#3b82b6;
}
/* 关键：小字优化，防止过度换行 */
.small-text{
  font-size:clamp(16px, 4.5vw, 22px);
  line-height:1.5;
  margin:15px 0 5px;
  color:#3b82b6;
  word-break:break-word;
  white-space:normal;
  padding:0 8px;
}
audio{
  display:none;
}
/* 手机小屏进一步优化 */
@media (max-width: 480px){
  .card{
    padding:35px 20px;
  }
  .decor{
    font-size:20px;
  }
}
</style>
</head>
<body>
<div class="card">
  <div class="decor">✨🎂✨</div>
  <h1>生日快乐，昊洋</h1>
  <div class="small-text">✨ 虽然错过了你前面的24个生日，但我会珍惜今后的每一个 ✨</div>
  <div class="decor" style="margin-top:20px">🌸</div>
</div>

<audio id="bgm" autoplay loop preload="auto">
  <source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener('click', function() {
  var audio = document.getElementById('bgm');
  if (audio && audio.paused) {
    audio.play().catch(function(e) {
      console.log('播放失败:', e);
    });
  }
});
</script>
</body>
</html>
